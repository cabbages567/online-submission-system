<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <!-- 登录表单 -->
        <div id="loginForm" class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">🔐 管理员登录</h3>
                        <form id="loginFormEl">
                            <div class="mb-3">
                                <label class="form-label">账号</label>
                                <input type="text" class="form-control" value="admin" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" value="admin123" readonly>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登录</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 管理界面 -->
        <div id="adminPanel" style="display: none;">
            <nav class="navbar navbar-dark bg-dark mb-4">
                <div class="container-fluid">
                    <span class="navbar-brand">管理后台</span>
                    <button class="btn btn-outline-light" onclick="logout()">退出</button>
                </div>
            </nav>
            
            <h2 class="mb-4">📊 投稿管理</h2>
            
            <!-- 统计卡片 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary">
                        <div class="card-body">
                            <h5 class="card-title">总投稿数</h5>
                            <h2 id="totalCount">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-warning">
                        <div class="card-body">
                            <h5 class="card-title">待审核</h5>
                            <h2 id="pendingCount">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success">
                        <div class="card-body">
                            <h5 class="card-title">已录用</h5>
                            <h2 id="acceptedCount">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-danger">
                        <div class="card-body">
                            <h5 class="card-title">已退稿</h5>
                            <h2 id="rejectedCount">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 投稿列表 -->
            <div class="card">
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>标题</th>
                                <th>作者</th>
                                <th>状态</th>
                                <th>时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="submissionsTable">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://你的后端地址/api';
        let token = localStorage.getItem('admin_token');
        
        // 检查是否已登录
        if (token) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadSubmissions();
        }
        
        // 登录
        document.getElementById('loginFormEl').onsubmit = async (e) => {
            e.preventDefault();
            
            const res = await fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'admin', password: 'admin123' })
            });
            
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                localStorage.setItem('admin_token', token);
                
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadSubmissions();
            } else {
                alert('登录失败');
            }
        };
        
        // 加载投稿
        async function loadSubmissions() {
            try {
                const res = await fetch(`${API_BASE}/admin/submissions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    localStorage.removeItem('admin_token');
                    location.reload();
                    return;
                }
                
                const submissions = await res.json();
                updateStats(submissions);
                renderTable(submissions);
            } catch (err) {
                alert('加载失败');
            }
        }
        
        // 更新统计
        function updateStats(submissions) {
            const total = submissions.length;
            const pending = submissions.filter(s => s.status === 'pending').length;
            const accepted = submissions.filter(s => s.status === 'accepted').length;
            const rejected = submissions.filter(s => s.status === 'rejected').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('acceptedCount').textContent = accepted;
            document.getElementById('rejectedCount').textContent = rejected;
        }
        
        // 渲染表格
        function renderTable(submissions) {
            const tbody = document.getElementById('submissionsTable');
            tbody.innerHTML = submissions.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td><strong>${item.title}</strong><br>
                        <small class="text-muted">${item.content.substring(0, 50)}...</small></td>
                    <td>${item.author}<br><small>${item.email || '无邮箱'}</small></td>
                    <td>
                        <select class="form-select form-select-sm" onchange="updateStatus(${item.id}, this.value)">
                            <option value="pending" ${item.status === 'pending' ? 'selected' : ''}>待审</option>
                            <option value="reviewing" ${item.status === 'reviewing' ? 'selected' : ''}>审核中</option>
                            <option value="accepted" ${item.status === 'accepted' ? 'selected' : ''}>已录用</option>
                            <option value="rejected" ${item.status === 'rejected' ? 'selected' : ''}>已退稿</option>
                        </select>
                    </td>
                    <td>${new Date(item.created_at).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="viewDetails(${item.id})">详情</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 更新状态
        async function updateStatus(id, status) {
            await fetch(`${API_BASE}/admin/submissions/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status })
            });
            loadSubmissions();
        }
        
        // 查看详情
        function viewDetails(id) {
            alert(`查看ID为 ${id} 的稿件详情`);
        }
        
        // 退出
        function logout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }
    </script>
</body>
</html>
