<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线投稿系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .navbar-brand { font-weight: bold; }
        .submission-card { transition: all 0.3s; }
        .submission-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">📝 在线投稿系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#submit">我要投稿</a></li>
                    <li class="nav-item"><a class="nav-link" href="#list">投稿列表</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">管理后台</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 首页内容 -->
    <div class="container mt-5">
        <!-- 轮播图 -->
        <div id="carouselExample" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-inner rounded-3" style="height: 300px;">
                <div class="carousel-item active">
                    <div class="d-flex align-items-center justify-content-center bg-success text-white h-100">
                        <div class="text-center">
                            <h1>欢迎使用在线投稿系统</h1>
                            <p class="lead">便捷、高效、多人协作的投稿平台</p>
                        </div>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="d-flex align-items-center justify-content-center bg-info text-white h-100">
                        <div class="text-center">
                            <h2>支持多人同时投稿</h2>
                            <p>随时随地提交您的作品</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 投稿表单 -->
        <section id="submit" class="mb-5">
            <h2 class="mb-4">📤 我要投稿</h2>
            <div class="card shadow">
                <div class="card-body">
                    <form id="submitForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">稿件标题 *</label>
                                <input type="text" class="form-control" name="title" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">作者姓名 *</label>
                                <input type="text" class="form-control" name="author" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" name="email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">栏目分类</label>
                                <select class="form-select" name="category">
                                    <option value="">请选择栏目</option>
                                    <option value="技术文章">技术文章</option>
                                    <option value="文学作品">文学作品</option>
                                    <option value="学术报告">学术报告</option>
                                    <option value="新闻稿">新闻稿</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">稿件内容 *</label>
                            <textarea class="form-control" name="content" rows="8" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <span id="submitBtnText">提交稿件</span>
                            <div id="submitLoading" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></div>
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- 投稿列表 -->
        <section id="list" class="mb-5">
            <h2 class="mb-4">📃 最新投稿</h2>
            <div id="submissionsList" class="row">
                <!-- 动态加载 -->
            </div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>© 2024 在线投稿系统 | 多人协作投稿平台</p>
            <p class="mb-0">技术支持：GitHub + Vercel + MySQL</p>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'https://你的后端地址/api'; // 部署后修改
        
        // 提交投稿
        document.getElementById('submitForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const btnText = submitBtn.querySelector('#submitBtnText');
            const loading = submitBtn.querySelector('#submitLoading');
            
            btnText.textContent = '提交中...';
            loading.classList.remove('d-none');
            submitBtn.disabled = true;
            
            try {
                const res = await fetch(`${API_BASE}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    alert('✅ 投稿成功！请等待审核。');
                    form.reset();
                    loadSubmissions(); // 刷新列表
                } else {
                    alert('❌ 提交失败，请重试');
                }
            } catch (err) {
                alert('网络错误，请检查连接');
            } finally {
                btnText.textContent = '提交稿件';
                loading.classList.add('d-none');
                submitBtn.disabled = false;
            }
        };
        
        // 加载投稿列表
        async function loadSubmissions() {
            try {
                const res = await fetch(`${API_BASE}/submissions`);
                const submissions = await res.json();
                
                const container = document.getElementById('submissionsList');
                if (submissions.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-info">暂无已录用稿件</div></div>';
                    return;
                }
                
                container.innerHTML = submissions.map(item => `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card submission-card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${item.title}</h5>
                                <p class="card-text text-muted">作者：${item.author}</p>
                                <p class="card-text"><small>栏目：${item.category || '未分类'}</small></p>
                                <p class="card-text"><small>投稿时间：${new Date(item.created_at).toLocaleDateString()}</small></p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('submissionsList').innerHTML = 
                    '<div class="col-12"><div class="alert alert-danger">加载失败</div></div>';
            }
        }
        
        // 页面加载时获取投稿
        window.onload = loadSubmissions;
    </script>
</body>
</html>
